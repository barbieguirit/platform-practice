server {
    listen 80 default_server;
    root /app/public;
    index index.php;

    # Pag-log
    access_log /var/log/nginx/access.log;
    error_log /var/log/nginx/error.log warn;

    # Security headers
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;

    # I-serve ang static files nang direkta
    location ~ ^/assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    # Paghawas ng .well-known requests (Let's Encrypt, etc.)
    location ~ /\.well-known {
        allow all;
    }

    # I-deny ang access sa hidden files
    location ~ /\. {
        deny all;
    }

    # I-deny ang access sa sensitive files
    location ~ ~$ {
        deny all;
    }

    # Main application - i-route ang lahat ng requests sa index.php
    location / {
        # Subukan ang file, directory, kung wala ay i-forward sa index.php
        try_files $uri $uri/ /index.php$is_args$args;
    }

    # PHP-FPM handler
    location ~ ^/index\.php {
        fastcgi_pass localhost:9000;
        fastcgi_split_path_info ^(.+\.php)(/.+)$;
        include fastcgi_params;

        # Custom FastCGI parameters
        fastcgi_param SCRIPT_FILENAME $realpath_root$fastcgi_script_name;
        fastcgi_param DOCUMENT_ROOT $realpath_root;
        fastcgi_param PATH_INFO $fastcgi_path_info;

        # Timeout settings para sa mahabang requests
        fastcgi_read_timeout 60s;
        fastcgi_connect_timeout 60s;
        
        # Huwag i-pass ang PATH_INFO sa sunod na request
        internal;
    }

    # I-deny ang execution ng PHP files sa ibang locations
    location ~ \.php$ {
        return 404;
    }
}