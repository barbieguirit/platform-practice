services:
  app:
    build:
      context: .
      dockerfile: Dockerfile

    ports:
      - "9000:80"

    environment:
      APP_ENV: prod
      APP_DEBUG: "false"
      DATABASE_URL: "${DATABASE_URL}"

    healthcheck:
      test: [ "CMD", "curl", "-f", "http://localhost/" ]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 10s

networks:
  platform-network:
    driver: bridge